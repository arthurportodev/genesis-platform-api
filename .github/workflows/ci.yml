name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate backend
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: genesis_platform_test
          POSTGRES_USER: genesis_test
          POSTGRES_PASSWORD: test-only
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U genesis_test -d genesis_platform_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      TEST_DATABASE_HOST: localhost
      TEST_DATABASE_PORT: 5433
      TEST_DATABASE_NAME: genesis_platform_test
      TEST_DATABASE_USER: genesis_test
      TEST_DATABASE_PASSWORD: test-only

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Display runtime versions
        run: |
          node --version
          npm --version
          node -e "if (process.versions.node.split('.')[0] !== '24') process.exit(1)"

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Run lint
        run: npm run lint

      - name: Build application
        run: npm run build

      - name: Run unit tests
        run: npm run test -- --runInBand

      - name: Run E2E tests
        run: npm run test:e2e -- --runInBand

      - name: Run integration tests
        run: npm run test:integration

      - name: Build Docker image
        run: docker build --tag genesis-platform-api:ci .
