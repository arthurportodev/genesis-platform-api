services:
  postgres-test:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: genesis_platform_test
      POSTGRES_USER: genesis_test
      POSTGRES_PASSWORD: test-only
    ports:
      - "127.0.0.1:5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
        ]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s
